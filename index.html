<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damiancitos Banda Show</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN (LOGO IZQUIERDA, MENÚ DERECHA) --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: #0d0d0d;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            background: #fff; /* Simula tu logo circular */
            border-radius: 50%;
            border: 2px solid #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-circle img { width: 100%; height: auto; }

        .logo-name {
            color: #d4af37;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            line-height: 1.1;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* --- SECCIÓN HERO (CENTRADO ABSOLUTO) --- */
        .hero {
            padding: 100px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CORRECCIÓN: Contenedor para una sola línea centrada */
        .single-line-content {
            display: flex;
            justify-content: center; /* Centra todo el bloque */
            align-items: center;     /* Alinea verticalmente */
            flex-wrap: nowrap;       /* Prohíbe el salto de línea */
            gap: 15px;               /* Espacio entre nombre y eslogan */
            margin-bottom: 35px;
            width: 100%;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 2.8rem;
            margin: 0;
            white-space: nowrap;
        }

        .hero-slogan {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin: 0;
            font-weight: 300;
            white-space: nowrap; /* Evita que el eslogan se rompa */
        }

        /* Botón Cotizar */
        .btn-whatsapp {
            background-color: #d4af37;
            color: #000;
            padding: 14px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transition: 0.3s;
        }

        .btn-whatsapp:hover { transform: scale(1.05); }

        /* --- SERVICIOS --- */
        .servicios-container {
            padding: 60px 5%;
            text-align: center;
        }

        .servicios-title {
            color: #d4af37;
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .servicios-sub {
            margin-bottom: 40px;
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .servicios-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #121212;
            padding: 50px 20px;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .card:hover { border-color: #d4af37; }

        .card i {
            font-size: 2.5rem;
            color: #d4af37;
        }

        /* Responsivo: Si la pantalla es pequeña, permitimos el salto para que no desaparezca el texto */
        @media (max-width: 1000px) {
            .single-line-content {
                flex-direction: column;
                white-space: normal;
                gap: 5px;
            }
            .hero-title, .hero-slogan { white-space: normal; }
            .servicios-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <div class="logo-circle">
                <img src="logo.png" alt="Logo">
            </div>
            <div class="logo-name">
                Damiancitos<br>Banda Show
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="single-line-content">
                <h2 class="hero-title">Damiancitos Banda Show</h2>
                <p class="hero-slogan">Elegancia, ritmo y tradición para tus mejores eventos en Riobamba y todo el Ecuador.</p>
            </div>

            <a href="#" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Cotizar Ahora
            </a>
        </section>

        <section class="servicios-container">
            <h2 class="servicios-title">Nuestros Servicios</h2>
            <p class="servicios-sub">Hacemos de tu celebración un momento inolvidable.</p>
            
            <div class="servicios-grid">
                <div class="card"><i class="fas fa-music"></i></div>
                <div class="card"><i class="fas fa-glass-cheers"></i></div>
                <div class="card"><i class="fas fa-church"></i></div>
            </div>
        </section>
    </main>

</body>
</html>
